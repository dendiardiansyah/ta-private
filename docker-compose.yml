services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: ta_private_app
    restart: unless-stopped
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    volumes:
      - ./:/var/www/html:delegated
      - composer_cache:/tmp/composer-cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel
    ports:
      - "8000:8000"
    command: sh -lc "php artisan serve --host=0.0.0.0 --port=8000"

  # Note: Nginx `web` service removed so `app` runs the built-in PHP server
  # If you prefer Nginx in front of PHP-FPM, restore the `web` service and
  # adjust ports accordingly.

  db:
    image: mysql:8.0
    container_name: ta_private_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-bank_sampah}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laravel

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: ta_private_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel

  node:
    image: node:20-alpine
    container_name: ta_private_node
    working_dir: /var/www/html
    user: "0:0"
    tty: true
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
      WATCHPACK_POLLING: "true"
      NPM_CONFIG_CACHE: /tmp/.npm
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html:delegated
      - node_modules:/var/www/html/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - laravel

volumes:
  db_data:
  composer_cache:
  node_modules:

networks:
  laravel:
    driver: bridge
